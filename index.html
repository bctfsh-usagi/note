<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />

<style>
  /* ---------- Design tokens (Apple-inspired) ---------- */
  :root {
    --bg: #ffffff;
    --bg-sidebar: #f5f5f7;
    --bg-hover: rgba(0, 0, 0, 0.04);
    --bg-selected: #ffd60a;
    --bg-selected-tint: rgba(255, 214, 10, 0.18);
    --text-primary: #1d1d1f;
    --text-secondary: #86868b;
    --text-tertiary: #a1a1a6;
    --border: rgba(0, 0, 0, 0.08);
    --border-strong: rgba(0, 0, 0, 0.14);
    --accent: #007aff;
    --danger: #ff3b30;
    --success: #34c759;
    --yellow: #ffcc00;

    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;

    --font-display: -apple-system, BlinkMacSystemFont, "SF Pro Display",
      "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    --font-text: -apple-system, BlinkMacSystemFont, "SF Pro Text",
      "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;

    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
    --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
    --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.12);

    --sidebar-width: 300px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100vh;
    height: 100dvh; /* 모바일에서 주소창 숨김 시에도 정확한 높이 */
    background: var(--bg-sidebar);
    color: var(--text-primary);
    font-family: var(--font-text);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    letter-spacing: -0.01em;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
  }

  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    background: none;
    color: inherit;
    padding: 0;
  }

  /* ---------- Layout ---------- */
  .app {
    display: grid;
    grid-template-columns: var(--sidebar-width) 1fr;
    height: 100vh;
    height: 100dvh;
    max-height: 100dvh;
    overflow: hidden;
  }

  /* ---------- Sidebar ---------- */
  .sidebar {
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: calc(18px + env(safe-area-inset-top)) 20px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .sidebar-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.022em;
    margin: 0;
  }

  .new-note-btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    transition: background 0.15s ease;
  }
  .new-note-btn:hover { background: var(--bg-hover); }
  .new-note-btn svg { width: 18px; height: 18px; }

  .search-wrap {
    padding: 0 14px 10px;
  }
  .search-input {
    width: 100%;
    padding: 7px 12px 7px 32px;
    background: rgba(0, 0, 0, 0.05);
    border: none;
    border-radius: 8px;
    font: inherit;
    font-size: 13px;
    color: var(--text-primary);
    outline: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%2386868b' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='8'/><path d='m21 21-4.35-4.35'/></svg>");
    background-repeat: no-repeat;
    background-position: 10px center;
  }
  .search-input::placeholder { color: var(--text-tertiary); }

  .folders {
    padding: 4px 8px 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .folder {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 12px;
    border-radius: 6px;
    font-size: 14px;
    color: var(--text-primary);
    transition: background 0.12s ease;
    position: relative;
    text-align: left;
    width: 100%;
  }
  .folder:hover { background: var(--bg-hover); }
  .folder.active {
    background: rgba(0, 122, 255, 0.12);
    color: var(--accent);
  }
  .folder svg { width: 16px; height: 16px; flex-shrink: 0; }
  .folder-count {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-tertiary);
    font-variant-numeric: tabular-nums;
  }
  .folder.active .folder-count { color: var(--accent); opacity: 0.7; }

  .sidebar-divider {
    height: 1px;
    background: var(--border);
    margin: 8px 14px;
  }

  .notes-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 8px calc(16px + env(safe-area-inset-bottom));
  }
  .notes-list::-webkit-scrollbar { width: 6px; }
  .notes-list::-webkit-scrollbar-thumb {
    background: rgba(0,0,0,0.1);
    border-radius: 3px;
  }

  .note-item {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.12s ease;
    position: relative;
  }
  .note-item:hover { background: var(--bg-hover); }
  .note-item.selected {
    background: var(--bg-selected-tint);
  }
  .note-item.selected::before {
    content: '';
    position: absolute;
    left: 4px;
    top: 10px;
    bottom: 10px;
    width: 3px;
    background: var(--yellow);
    border-radius: 2px;
  }
  .note-item-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .note-item-meta {
    font-size: 12px;
    color: var(--text-secondary);
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .note-item-date { font-variant-numeric: tabular-nums; }
  .note-item-preview {
    color: var(--text-tertiary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .empty-list {
    padding: 48px 20px;
    text-align: center;
    color: var(--text-tertiary);
    font-size: 13px;
  }

  /* ---------- Main view ---------- */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .main-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: calc(12px + env(safe-area-inset-top)) 20px 12px;
    border-bottom: 1px solid var(--border);
    min-height: 52px;
    background: var(--bg);
  }

  .back-btn {
    display: none;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    color: var(--accent);
    align-items: center;
    justify-content: center;
  }
  .back-btn:hover { background: var(--bg-hover); }

  .toolbar-spacer { flex: 1; }

  .icon-btn {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    color: var(--text-secondary);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .icon-btn:hover:not(:disabled) {
    background: var(--bg-hover);
    color: var(--text-primary);
  }
  .icon-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .icon-btn svg { width: 17px; height: 17px; }
  .icon-btn.danger:hover { color: var(--danger); }

  .toolbar-date {
    font-size: 12px;
    color: var(--text-tertiary);
    font-variant-numeric: tabular-nums;
    margin-right: 8px;
  }

  /* ---------- Empty state ---------- */
  .main-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-tertiary);
    text-align: center;
    padding: 40px;
  }
  .main-empty svg { width: 64px; height: 64px; opacity: 0.4; margin-bottom: 20px; }
  .main-empty h2 {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 600;
    color: var(--text-secondary);
    margin: 0 0 8px;
    letter-spacing: -0.02em;
  }
  .main-empty p { margin: 0; font-size: 14px; max-width: 320px; }

  /* ---------- Note detail ---------- */
  .note-detail {
    flex: 1;
    overflow-y: auto;
    padding: 32px 48px calc(80px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
  }

  .note-title-input {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.022em;
    color: var(--text-primary);
    border: none;
    outline: none;
    padding: 0;
    margin: 0 0 6px;
    background: transparent;
    width: 100%;
    font-family: inherit;
  }
  .note-title-input::placeholder { color: var(--text-tertiary); }

  .note-date {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 28px;
    font-variant-numeric: tabular-nums;
  }

  /* ---------- Record panel ---------- */
  .record-panel {
    background: linear-gradient(180deg, #fafafa 0%, #f5f5f7 100%);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 28px 32px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .record-btn {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--danger);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1), background 0.2s ease;
    flex-shrink: 0;
    box-shadow: 0 4px 16px rgba(255, 59, 48, 0.35);
    position: relative;
  }
  .record-btn:hover { transform: scale(1.05); }
  .record-btn:active { transform: scale(0.96); }
  .record-btn-inner {
    width: 26px;
    height: 26px;
    background: white;
    border-radius: 50%;
    transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .record-btn.recording {
    background: #ff3b30;
  }
  .record-btn.recording .record-btn-inner {
    width: 20px;
    height: 20px;
    border-radius: 4px;
  }
  .record-btn.recording::before {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 2px solid var(--danger);
    opacity: 0.6;
    animation: pulse-ring 1.6s cubic-bezier(0.2, 0.8, 0.2, 1) infinite;
  }
  @keyframes pulse-ring {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.4); opacity: 0; }
  }

  .record-info { flex: 1; min-width: 0; }
  .record-status {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .record-status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-tertiary);
  }
  .record-btn.recording + .record-info .record-status-dot {
    background: var(--danger);
    animation: blink 1.2s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .record-timer {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
    color: var(--text-primary);
  }

  /* ---------- Section ---------- */
  .section {
    margin-bottom: 28px;
  }
  .section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-tertiary);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .transcript-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 18px 20px;
    font-size: 15px;
    line-height: 1.65;
    color: var(--text-primary);
    min-height: 120px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .transcript-box.empty {
    color: var(--text-tertiary);
    font-style: italic;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .interim-text {
    color: var(--text-secondary);
    font-style: italic;
  }

  .summary-box {
    background: #fffbea;
    border: 1px solid rgba(255, 204, 0, 0.3);
    border-radius: var(--radius-md);
    padding: 20px 22px;
    font-size: 14.5px;
    line-height: 1.7;
    color: var(--text-primary);
    white-space: pre-wrap;
  }
  .summary-box h3 {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 600;
    margin: 14px 0 6px;
    letter-spacing: -0.01em;
  }
  .summary-box h3:first-child { margin-top: 0; }
  .summary-box ul { margin: 6px 0 10px; padding-left: 20px; }
  .summary-box li { margin-bottom: 4px; }
  .summary-box p { margin: 0 0 10px; }

  .summary-loading {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-secondary);
    font-size: 14px;
  }
  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(0,0,0,0.1);
    border-top-color: var(--text-secondary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .summarize-btn {
    padding: 8px 14px;
    border-radius: 8px;
    background: var(--accent);
    color: white;
    font-size: 13px;
    font-weight: 500;
    transition: opacity 0.15s ease, transform 0.1s ease;
  }
  .summarize-btn:hover { opacity: 0.9; }
  .summarize-btn:active { transform: scale(0.97); }
  .summarize-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ---------- Toast ---------- */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: white;
    padding: 10px 18px;
    border-radius: 22px;
    font-size: 13px;
    z-index: 1000;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ---------- Browser warning ---------- */
  .warning-banner {
    background: #fff4e5;
    border-bottom: 1px solid rgba(255, 149, 0, 0.2);
    padding: 10px 20px;
    font-size: 13px;
    color: #8b5a00;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .warning-banner svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* ---------- Responsive ---------- */
  @media (max-width: 768px) {
    .app {
      grid-template-columns: 1fr;
    }
    .sidebar {
      display: flex;
    }
    .main {
      display: none;
    }
    .app.show-detail .sidebar { display: none; }
    .app.show-detail .main { display: flex; }
    .back-btn { display: inline-flex; }
    .note-detail {
      padding: 20px 20px calc(80px + env(safe-area-inset-bottom));
    }
    .note-title-input { font-size: 26px; }
    .record-panel {
      padding: 20px;
      gap: 16px;
    }
    .record-btn { width: 56px; height: 56px; }
    .record-timer { font-size: 24px; }
  }
</style>
</head>
<body>

<div class="app" id="app">
  <!-- ============ Sidebar ============ -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1 class="sidebar-title">회의록</h1>
      <button class="new-note-btn" id="newNoteBtn" title="새 녹음">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
      </button>
    </div>

    <div class="search-wrap">
      <input type="text" class="search-input" id="searchInput" placeholder="검색" />
    </div>

    <nav class="folders" id="folders">
      <button class="folder active" data-filter="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        <span>모든 기록</span>
        <span class="folder-count" id="count-active">0</span>
      </button>
      <button class="folder" data-filter="archived">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="5" rx="1"/>
          <path d="M4 9v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9"/>
          <path d="M10 13h4"/>
        </svg>
        <span>보관함</span>
        <span class="folder-count" id="count-archived">0</span>
      </button>
      <button class="folder" data-filter="trash">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6M14 11v6"/>
        </svg>
        <span>최근 삭제된 항목</span>
        <span class="folder-count" id="count-trash">0</span>
      </button>
    </nav>

    <div class="sidebar-divider"></div>

    <div class="notes-list" id="notesList"></div>
  </aside>

  <!-- ============ Main ============ -->
  <main class="main" id="main">
    <div class="main-toolbar">
      <button class="back-btn" id="backBtn" title="뒤로">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <div class="toolbar-spacer"></div>
      <span class="toolbar-date" id="toolbarDate"></span>
      <button class="icon-btn" id="archiveBtn" title="보관" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="5" rx="1"/>
          <path d="M4 9v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9"/>
          <path d="M10 13h4"/>
        </svg>
      </button>
      <button class="icon-btn" id="restoreBtn" title="복원" disabled style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 3-6.7L3 8"/>
          <polyline points="3 3 3 8 8 8"/>
        </svg>
      </button>
      <button class="icon-btn danger" id="deleteBtn" title="삭제" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6M14 11v6"/>
          <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
      </button>
    </div>

    <div class="main-empty" id="mainEmpty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
      <h2>선택된 기록이 없습니다</h2>
      <p>왼쪽 상단의 <strong>+</strong> 버튼을 눌러 새로운 녹음을 시작하세요.</p>
    </div>

    <div class="note-detail" id="noteDetail" style="display:none">
      <input type="text" class="note-title-input" id="noteTitle" placeholder="제목 없음" />
      <div class="note-date" id="noteDate"></div>

      <div class="record-panel" id="recordPanel">
        <button class="record-btn" id="recordBtn" title="녹음">
          <span class="record-btn-inner"></span>
        </button>
        <div class="record-info">
          <div class="record-status">
            <span class="record-status-dot"></span>
            <span id="recordStatusText">녹음 준비됨</span>
          </div>
          <div class="record-timer" id="recordTimer">00:00</div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">
          <span>전사 내용</span>
        </div>
        <div class="transcript-box empty" id="transcriptBox">
          녹음을 시작하면 음성이 자동으로 텍스트로 변환됩니다.
        </div>
      </div>

      <div class="section" id="summarySection">
        <div class="section-label" style="justify-content:space-between; display:flex">
          <span>요약</span>
          <button class="summarize-btn" id="summarizeBtn" style="display:none">다시 요약</button>
        </div>
        <div class="summary-box" id="summaryBox" style="display:none"></div>
        <div class="transcript-box empty" id="summaryEmpty">
          녹음이 끝나면 주요 내용이 자동으로 요약됩니다.
        </div>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
  // ================== State ==================
  const STORAGE_KEY = 'meeting_notes_v1';
  let notes = [];
  let currentNoteId = null;
  let currentFilter = 'active';
  let searchQuery = '';

  let recognition = null;
  let isRecording = false;
  let shouldRestart = false;
  let finalTranscript = '';
  let interimTranscript = '';
  let recordStartTime = 0;
  let timerInterval = null;

  // ================== DOM ==================
  const $ = (id) => document.getElementById(id);
  const app = $('app');
  const notesListEl = $('notesList');
  const noteDetailEl = $('noteDetail');
  const mainEmptyEl = $('mainEmpty');
  const recordBtn = $('recordBtn');
  const recordTimerEl = $('recordTimer');
  const recordStatusTextEl = $('recordStatusText');
  const transcriptBox = $('transcriptBox');
  const summaryBox = $('summaryBox');
  const summaryEmpty = $('summaryEmpty');
  const summarizeBtn = $('summarizeBtn');
  const noteTitleInput = $('noteTitle');
  const noteDateEl = $('noteDate');
  const toolbarDate = $('toolbarDate');
  const archiveBtn = $('archiveBtn');
  const restoreBtn = $('restoreBtn');
  const deleteBtn = $('deleteBtn');
  const searchInput = $('searchInput');

  // ================== Persistence (localStorage) ==================
  async function loadNotes() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      notes = raw ? JSON.parse(raw) : [];
    } catch {
      notes = [];
    }
  }

  async function saveNotes() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    } catch (e) {
      console.error('저장 실패:', e);
      showToast('저장에 실패했습니다');
    }
  }

  // ================== Helpers ==================
  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  function formatDate(iso) {
    const d = new Date(iso);
    const today = new Date();
    const yesterday = new Date(today);
    yesterday.setDate(today.getDate() - 1);

    const sameDay = (a, b) =>
      a.getFullYear() === b.getFullYear() &&
      a.getMonth() === b.getMonth() &&
      a.getDate() === b.getDate();

    const time = d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });

    if (sameDay(d, today)) return `오늘 ${time}`;
    if (sameDay(d, yesterday)) return `어제 ${time}`;

    const sameYear = d.getFullYear() === today.getFullYear();
    return d.toLocaleDateString('ko-KR', {
      year: sameYear ? undefined : 'numeric',
      month: 'long',
      day: 'numeric'
    });
  }

  function formatFullDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('ko-KR', {
      year: 'numeric', month: 'long', day: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  function formatTimer(sec) {
    const m = Math.floor(sec / 60).toString().padStart(2, '0');
    const s = Math.floor(sec % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
  }

  function showToast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._to);
    t._to = setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ================== Rendering ==================
  function getFilteredNotes() {
    return notes
      .filter(n => n.status === currentFilter)
      .filter(n => {
        if (!searchQuery) return true;
        const q = searchQuery.toLowerCase();
        return (n.title || '').toLowerCase().includes(q) ||
               (n.transcript || '').toLowerCase().includes(q) ||
               (n.summary || '').toLowerCase().includes(q);
      })
      .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
  }

  function renderFolderCounts() {
    $('count-active').textContent = notes.filter(n => n.status === 'active').length;
    $('count-archived').textContent = notes.filter(n => n.status === 'archived').length;
    $('count-trash').textContent = notes.filter(n => n.status === 'trash').length;
  }

  function renderNotesList() {
    const list = getFilteredNotes();
    notesListEl.innerHTML = '';
    if (list.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-list';
      empty.textContent = searchQuery ? '검색 결과가 없습니다' :
        currentFilter === 'active' ? '아직 기록이 없습니다' :
        currentFilter === 'archived' ? '보관된 기록이 없습니다' :
        '삭제된 기록이 없습니다';
      notesListEl.appendChild(empty);
      return;
    }
    list.forEach(note => {
      const item = document.createElement('div');
      item.className = 'note-item' + (note.id === currentNoteId ? ' selected' : '');
      const preview = (note.summary || note.transcript || '녹음 없음').replace(/\s+/g, ' ').slice(0, 60);
      item.innerHTML = `
        <div class="note-item-title">${escapeHtml(note.title || '제목 없음')}</div>
        <div class="note-item-meta">
          <span class="note-item-date">${formatDate(note.createdAt)}</span>
          <span class="note-item-preview">${escapeHtml(preview)}</span>
        </div>`;
      item.onclick = () => selectNote(note.id);
      notesListEl.appendChild(item);
    });
  }

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[c]);
  }

  function renderDetail() {
    const note = notes.find(n => n.id === currentNoteId);
    if (!note) {
      noteDetailEl.style.display = 'none';
      mainEmptyEl.style.display = 'flex';
      archiveBtn.disabled = restoreBtn.disabled = deleteBtn.disabled = true;
      toolbarDate.textContent = '';
      return;
    }
    noteDetailEl.style.display = 'flex';
    mainEmptyEl.style.display = 'none';

    noteTitleInput.value = note.title || '';
    noteDateEl.textContent = formatFullDate(note.createdAt);
    toolbarDate.textContent = formatFullDate(note.createdAt);

    // Transcript
    if (note.transcript && note.transcript.trim()) {
      transcriptBox.classList.remove('empty');
      transcriptBox.textContent = note.transcript;
    } else {
      transcriptBox.classList.add('empty');
      transcriptBox.textContent = '녹음을 시작하면 음성이 자동으로 텍스트로 변환됩니다.';
    }

    // Summary — coming soon
    summaryBox.style.display = 'none';
    summaryEmpty.style.display = 'flex';
    summaryEmpty.classList.add('empty');
    summaryEmpty.innerHTML = '🔜 요약 기능은 준비 중입니다';
    summarizeBtn.style.display = 'none';

    // Toolbar buttons per status
    archiveBtn.style.display = note.status === 'active' ? '' : 'none';
    restoreBtn.style.display = (note.status === 'archived' || note.status === 'trash') ? '' : 'none';
    archiveBtn.disabled = false;
    restoreBtn.disabled = false;
    deleteBtn.disabled = false;
    deleteBtn.title = note.status === 'trash' ? '영구 삭제' : '삭제';
  }

  function formatSummary(s) {
    // Convert simple markdown-ish formatting
    let html = escapeHtml(s);
    // Headings: lines starting with ##
    html = html.replace(/^## (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^# (.+)$/gm, '<h3>$1</h3>');
    // Bullet lists
    html = html.replace(/(^|\n)[-•·] (.+)/g, '$1<li>$2</li>');
    html = html.replace(/(<li>[\s\S]+?<\/li>)(?!\s*<li>)/g, m => '<ul>' + m + '</ul>');
    html = html.replace(/<\/ul>\s*<ul>/g, '');
    // Paragraphs
    html = html.split(/\n{2,}/).map(p => {
      if (p.trim().startsWith('<')) return p;
      return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
    }).join('');
    return html;
  }

  // ================== Selection & Filters ==================
  function selectNote(id) {
    currentNoteId = id;
    if (isRecording) stopRecording(false);
    renderNotesList();
    renderDetail();
    if (window.innerWidth <= 768) app.classList.add('show-detail');
  }

  function setFilter(filter) {
    currentFilter = filter;
    document.querySelectorAll('.folder').forEach(f => {
      f.classList.toggle('active', f.dataset.filter === filter);
    });
    // If current selected note is no longer in this filter, deselect
    const cur = notes.find(n => n.id === currentNoteId);
    if (!cur || cur.status !== filter) currentNoteId = null;
    renderNotesList();
    renderDetail();
  }

  // ================== CRUD ==================
  async function createNewNote() {
    const note = {
      id: uid(),
      title: '',
      createdAt: new Date().toISOString(),
      transcript: '',
      summary: '',
      status: 'active',
      duration: 0
    };
    notes.unshift(note);
    await saveNotes();
    if (currentFilter !== 'active') setFilter('active');
    selectNote(note.id);
    renderFolderCounts();
    // focus title
    setTimeout(() => noteTitleInput.focus(), 100);
  }

  async function archiveNote() {
    const note = notes.find(n => n.id === currentNoteId);
    if (!note) return;
    note.status = 'archived';
    await saveNotes();
    currentNoteId = null;
    renderNotesList();
    renderDetail();
    renderFolderCounts();
    showToast('보관함으로 이동했습니다');
  }

  async function restoreNote() {
    const note = notes.find(n => n.id === currentNoteId);
    if (!note) return;
    note.status = 'active';
    await saveNotes();
    renderNotesList();
    renderDetail();
    renderFolderCounts();
    showToast('복원되었습니다');
  }

  async function deleteNote() {
    const note = notes.find(n => n.id === currentNoteId);
    if (!note) return;
    if (note.status === 'trash') {
      if (!confirm('이 기록을 영구적으로 삭제하시겠어요? 이 작업은 되돌릴 수 없습니다.')) return;
      notes = notes.filter(n => n.id !== currentNoteId);
      currentNoteId = null;
      showToast('영구 삭제되었습니다');
    } else {
      note.status = 'trash';
      currentNoteId = null;
      showToast('휴지통으로 이동했습니다');
    }
    await saveNotes();
    renderNotesList();
    renderDetail();
    renderFolderCounts();
  }

  async function updateNoteTitle(title) {
    const note = notes.find(n => n.id === currentNoteId);
    if (!note) return;
    note.title = title;
    await saveNotes();
    renderNotesList();
  }

  // ================== Recording ==================
  function initSpeechRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return null;
    const r = new SR();
    r.lang = 'ko-KR';
    r.continuous = true;
    r.interimResults = true;

    r.onresult = (event) => {
      let interim = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript;
        if (event.results[i].isFinal) {
          finalTranscript += transcript;
          if (!/[\s.!?。…]$/.test(transcript)) finalTranscript += ' ';
        } else {
          interim += transcript;
        }
      }
      interimTranscript = interim;
      updateLiveTranscript();
    };

    r.onerror = (e) => {
      console.warn('Speech recognition error:', e.error);
      if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
        showToast('마이크 권한이 필요합니다');
        shouldRestart = false;
        stopRecording(true);
      } else if (e.error === 'no-speech') {
        // ignore
      }
    };

    r.onend = () => {
      if (shouldRestart && isRecording) {
        try { r.start(); } catch {}
      }
    };

    return r;
  }

  function updateLiveTranscript() {
    transcriptBox.classList.remove('empty');
    const finalEl = document.createElement('span');
    finalEl.textContent = finalTranscript;
    const interimEl = document.createElement('span');
    interimEl.className = 'interim-text';
    interimEl.textContent = interimTranscript;
    transcriptBox.innerHTML = '';
    transcriptBox.appendChild(finalEl);
    transcriptBox.appendChild(interimEl);
    // auto-scroll into view
    transcriptBox.scrollTop = transcriptBox.scrollHeight;
  }

  async function startRecording() {
    if (!currentNoteId) {
      await createNewNote();
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      showToast('이 브라우저는 음성 인식을 지원하지 않습니다');
      return;
    }

    // Request mic permission explicitly for better UX (Safari, etc.)
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      // We don't need the stream itself; release immediately after permission.
      stream.getTracks().forEach(t => t.stop());
    } catch (e) {
      showToast('마이크 권한이 필요합니다');
      return;
    }

    const note = notes.find(n => n.id === currentNoteId);
    finalTranscript = note.transcript ? note.transcript.trim() + ' ' : '';
    interimTranscript = '';

    recognition = initSpeechRecognition();
    if (!recognition) {
      showToast('음성 인식을 초기화할 수 없습니다');
      return;
    }

    try {
      recognition.start();
    } catch (e) {
      console.error(e);
      return;
    }

    isRecording = true;
    shouldRestart = true;
    recordStartTime = Date.now() - (note.duration || 0) * 1000;
    recordBtn.classList.add('recording');
    recordStatusTextEl.textContent = '녹음 중…';

    timerInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - recordStartTime) / 1000);
      recordTimerEl.textContent = formatTimer(elapsed);
    }, 250);

    updateLiveTranscript();
  }

  async function stopRecording(autoSummarize = true) {
    if (!isRecording) return;
    isRecording = false;
    shouldRestart = false;
    if (recognition) {
      try { recognition.stop(); } catch {}
      recognition = null;
    }
    clearInterval(timerInterval);
    recordBtn.classList.remove('recording');
    recordStatusTextEl.textContent = '녹음 완료';

    const note = notes.find(n => n.id === currentNoteId);
    if (!note) return;

    const combined = (finalTranscript + interimTranscript).trim();
    note.transcript = combined;
    note.duration = Math.floor((Date.now() - recordStartTime) / 1000);

    // Auto title from first few words if empty
    if (!note.title && combined) {
      note.title = combined.split(/\s+/).slice(0, 8).join(' ').slice(0, 40);
    }

    await saveNotes();
    renderNotesList();
    renderDetail();

    // Auto-summarize disabled for now — coming later
    // if (autoSummarize && combined.length > 10) {
    //   generateSummary();
    // }
  }

  // ================== Summary via Claude API ==================
  async function generateSummary() {
    const note = notes.find(n => n.id === currentNoteId);
    if (!note || !note.transcript) return;

    summaryEmpty.style.display = 'none';
    summaryBox.style.display = 'block';
    summaryBox.innerHTML = `
      <div class="summary-loading">
        <div class="spinner"></div>
        <span>요약을 생성하는 중…</span>
      </div>`;
    summarizeBtn.disabled = true;

    const prompt = `다음은 회의 또는 대화를 음성 인식으로 전사한 내용입니다. 이 내용을 한국어로 다음 형식에 맞춰 명확하게 요약해 주세요:

## 핵심 요약
(2-3문장으로 전체 내용을 요약)

## 주요 논의 사항
- (핵심 주제들을 불릿으로)

## 결정 사항
- (명확히 결정된 것들을 불릿으로. 없으면 "명확한 결정 사항 없음"이라고 적어주세요)

## 액션 아이템
- (해야 할 일, 담당자가 언급되었다면 함께. 없으면 "액션 아이템 없음"이라고 적어주세요)

전사 내용 중 명확하지 않거나 잘못 인식된 것 같은 부분은 맥락에 맞게 이해해서 요약해 주세요. 불릿 기호는 "-"를 사용해 주세요.

---
전사 내용:
${note.transcript}`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1500,
          messages: [{ role: "user", content: prompt }]
        })
      });
      const data = await response.json();
      const text = (data.content || [])
        .map(c => c.type === 'text' ? c.text : '')
        .filter(Boolean)
        .join('\n');

      if (!text) throw new Error('빈 응답');

      note.summary = text;
      await saveNotes();
      summaryBox.innerHTML = formatSummary(text);
      summarizeBtn.style.display = 'inline-block';
      summarizeBtn.disabled = false;
      renderNotesList();
    } catch (e) {
      console.error(e);
      summaryBox.innerHTML = `<p style="color:var(--danger)">요약 생성에 실패했습니다. 다시 시도해주세요.</p>`;
      summarizeBtn.disabled = false;
      summarizeBtn.style.display = 'inline-block';
    }
  }

  // ================== Event bindings ==================
  $('newNoteBtn').addEventListener('click', createNewNote);
  $('backBtn').addEventListener('click', () => app.classList.remove('show-detail'));

  document.querySelectorAll('.folder').forEach(f => {
    f.addEventListener('click', () => setFilter(f.dataset.filter));
  });

  searchInput.addEventListener('input', (e) => {
    searchQuery = e.target.value.trim();
    renderNotesList();
  });

  recordBtn.addEventListener('click', () => {
    if (isRecording) stopRecording();
    else startRecording();
  });

  noteTitleInput.addEventListener('input', (e) => updateNoteTitle(e.target.value));
  noteTitleInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); noteTitleInput.blur(); }
  });

  archiveBtn.addEventListener('click', archiveNote);
  restoreBtn.addEventListener('click', restoreNote);
  deleteBtn.addEventListener('click', deleteNote);
  summarizeBtn.addEventListener('click', generateSummary);

  // Browser support warning
  function checkSupport() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      const banner = document.createElement('div');
      banner.className = 'warning-banner';
      banner.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        <span>현재 브라우저는 실시간 음성 인식을 지원하지 않습니다. Chrome, Edge 또는 Safari를 사용해 주세요.</span>`;
      document.querySelector('.main-toolbar').after(banner);
    }
  }

  // ================== Init ==================
  (async function init() {
    await loadNotes();
    renderFolderCounts();
    renderNotesList();
    renderDetail();
    checkSupport();
  })();

  // Handle window resize for responsive detail toggle
  window.addEventListener('resize', () => {
    if (window.innerWidth > 768) app.classList.remove('show-detail');
  });
</script>
</body>
</html>
